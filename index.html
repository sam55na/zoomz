<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IChancy Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0b0e17;
            --gold-main: #ffd700;
            --gold-dark: #b8860b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%; min-height: 100vh;
            background: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; user-select: none;
            padding: 15px 10px 30px 10px;
        }

        /* الخلفية الديناميكية */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 30%, #1f1d35 0%, #05050c 100%);
            background-size: cover;
            background-position: center;
        }
        .bg-layer img {
            display: none;
            width: 100%; height: 100%; object-fit: cover;
        }

        /* === النصوص العلوية === */
        .header-ui {
            width: 100%; max-width: 420px;
            text-align: center; margin-bottom: 15px; z-index: 10;
        }
        .header-ui .status-line {
            display: flex; align-items: center; justify-content: center;
            color: #e5c07b; font-size: 18px; font-weight: 700; gap: 8px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.05);
        }
        .header-ui .sub-text {
            color: #8f8575; font-size: 13px; line-height: 1.7; margin-top: 6px;
        }
        .header-ui .sub-text .gold { color: var(--gold-main); font-weight: bold; }

        /* === العجلة === */
        .wheel-wrapper {
            position: relative; width: 100%; max-width: 400px;
            aspect-ratio: 1/1; margin: 0 auto 10px auto;
            display: none; z-index: 5;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .wheel-wrapper.visible { display: block; }

        .wheel-container {
            position: relative; width: 100%; height: 100%;
            border-radius: 50%;
            padding: 8px;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.03);
        }

        /* السهم الذهبي */
        .arrow {
            position: absolute; top: -12px; left: 50%;
            transform: translateX(-50%); z-index: 20;
            width: 0; height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-top: 45px solid #ffd700;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.8));
            pointer-events: none;
        }
        .arrow::after {
            content: ''; position: absolute; top: -50px; left: -14px;
            width: 28px; height: 28px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #e6b800);
            border-radius: 50%;
            box-shadow: inset 0 -3px 6px rgba(0,0,0,0.4);
        }

        /* اللوحة */
        #wheelCanvas {
            width: 100% !important; height: 100% !important;
            border-radius: 50%; display: block;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.7);
            background: transparent;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9) rotate(-8deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        /* === الزر === */
        .action-area { width: 100%; max-width: 380px; display: flex; justify-content: center; margin-top: -5px; z-index: 10; }
        .btn-spin {
            padding: 16px 40px; border: none; border-radius: 50px;
            width: 100%; max-width: 280px;
            font-size: 19px; font-weight: 800; color: #1a1a1a;
            background: linear-gradient(180deg, #fdf0b0 0%, #d4af37 100%);
            box-shadow: 0 6px 30px rgba(255, 215, 0, 0.2), inset 0 2px 0 rgba(255,255,255,0.7);
            cursor: pointer; transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-spin:active:not(:disabled) { transform: scale(0.95); }
        .btn-spin:disabled { opacity: 0.5; filter: grayscale(0.6); box-shadow: none; cursor: not-allowed; transform: none; }
        
        .btn-spin .icon { font-size: 20px; }
        .btn-spin .timer-text { font-size: 17px; color: #4a3b1a; }

        .loader-ring { display: none; width: 20px; height: 20px; border: 3px solid rgba(0,0,0,0.1); border-top: 3px solid #000; border-radius: 50%; animation: spin 0.8s linear infinite; }
        .btn-spin.loading .loader-ring { display: inline-block; }
        .btn-spin.loading .btn-text { display: none; }
        .btn-spin.loading .icon { display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* === النتيجة === */
        .result-panel {
            width: 100%; max-width: 380px; margin-top: 15px;
            padding: 15px; background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 20px; text-align: center;
            display: none; z-index: 10;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .result-panel.show { display: block; animation: popIn 0.5s forwards; }
        .result-panel.winner { border-color: rgba(255, 215, 0, 0.5); box-shadow: 0 0 40px rgba(255, 215, 0, 0.1); }
        
        .result-panel .p-title {
            font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 4px;
        }
        .result-panel.winner .p-title { background: linear-gradient(135deg, #ffd700, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result-panel .p-desc { font-size: 15px; color: #a99b8b; }

        /* === شاشة التحميل === */
        .loading-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-dark); z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .loading-screen.active { display: flex; }
        .custom-spinner { width: 40px; height: 40px; border: 4px solid rgba(255, 215, 0, 0.1); border-top: 4px solid #ffd700; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        .loading-screen p { color: #666; font-size: 14px; }

        /* === التنبيهات === */
        .status-msg {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; padding: 12px 24px; border-radius: 15px;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            color: #fff; font-weight: bold; font-size: 14px;
            display: none; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            max-width: 90%; text-align: center; opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .status-msg.active { display: block; opacity: 1; transform: translateX(-50%) translateY(0); }
        .status-msg.success { border-color: #00ff88; color: #00ff88; }
        .status-msg.error { border-color: #ff4444; color: #ff6b6b; }

        /* =========================================================
           لوحة الإدارة الكاملة (Admin Panel Complete)
           ========================================================= */
        .admin-panel {
            display: none; width: 100%; max-width: 480px; margin-top: 25px;
            background: rgba(20, 22, 32, 0.85); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 24px; padding: 20px; z-index: 10; position: relative;
        }
        .admin-panel.visible { display: block; animation: popIn 0.5s ease; }
        
        .admin-panel h3 { color: #ffd700; font-size: 18px; margin-bottom: 15px; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
        
        /* قسم الجوائز */
        .ap-section-title { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 10px 0; }
        
        .ap-item {
            display: grid; grid-template-columns: 30px 1fr 60px 30px 30px 30px;
            gap: 8px; padding: 8px 10px; margin-bottom: 6px;
            background: rgba(255,255,255,0.03); border-radius: 8px;
            align-items: center; border: 1px solid rgba(255,255,255,0.03);
        }
        .ap-item input, .ap-item input[type="color"] {
            background: #15171f; border: 1px solid #2a2e3d; color: #fff; padding: 4px 6px; border-radius: 4px; font-size: 12px; width: 100%; height: 24px;
        }
        .ap-item input:focus { border-color: #ffd700; outline: none; }
        .ap-item input[type="color"] { padding: 2px; width: 100%; }
        .ap-item .ap-del { background: #f55; border: none; color: #fff; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; height: 24px; width: 100%;}
        .ap-item .ap-save { background: #ffd700; border: none; color: #000; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; height: 24px; width: 100%;}

        /* نموذج الإضافة */
        .ap-add-form { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; }
        .ap-add-form input { flex: 1; min-width: 40px; background: #15171f; border: 1px solid #2a2e3d; padding: 6px; border-radius: 4px; color: #fff; font-size: 12px; }
        .ap-add-form input[type="color"] { padding: 2px; flex: 0 0 30px; }
        .ap-add-form button { background: #ffd700; border: none; padding: 6px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; color: #000; }

        /* قسم الإعدادات العامة */
        .ap-settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .ap-setting-item { display: flex; flex-direction: column; gap: 4px; }
        .ap-setting-item label { color: #888; font-size: 11px; }
        .ap-setting-item input, .ap-setting-item textarea { background: #15171f; border: 1px solid #2a2e3d; color: #fff; padding: 6px; border-radius: 4px; font-size: 12px; width: 100%; }
        .ap-setting-item input:focus, .ap-setting-item textarea:focus { border-color: #ffd700; outline: none; }
        .ap-setting-item button { background: #2a2e3d; border: none; color: #fff; padding: 4px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-top: 4px; transition: 0.2s; }
        .ap-setting-item button:hover { background: #ffd700; color: #000; }

        .ap-checkbox { display: flex; align-items: center; gap: 6px; color: #888; font-size: 12px; margin-top: 4px; }
        .ap-checkbox input { width: 16px; height: 16px; accent-color: #ffd700; }

    </style>
</head>
<body>
    <div class="bg-layer" id="bgLayer">
        <img id="bgImage" src="https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?w=1920&q=80" alt="Background">
    </div>

    <div class="loading-screen" id="loadingScreen">
        <div class="custom-spinner"></div>
        <p>جاري تحميل البيانات...</p>
    </div>

    <div class="status-msg" id="globalMsg"></div>

    <div class="header-ui">
        <div class="status-line">🔒 لا تملك أي لفة حالياً</div>
        <div class="sub-text">
            💰 أودع <span class="gold">50,000</span> ل.س أو أكثر اليوم<br>
            واحصل على لفة مجانية!<br>
            👥 أو اجمع <span class="gold">5</span> إحالات نشطة اليوم
        </div>
    </div>

    <div class="wheel-wrapper" id="wheelWrapper">
        <div class="wheel-container">
            <div class="arrow"></div>
            <canvas id="wheelCanvas" width="600" height="600"></canvas>
        </div>
    </div>

    <div class="action-area">
        <button class="btn-spin" id="spinBtn" disabled>
            <span class="loader-ring"></span>
            <span class="icon">🎯</span>
            <span class="btn-text">دَوِّر العجلة!</span>
        </button>
    </div>

    <div class="result-panel" id="resultPanel">
        <div class="p-title" id="resultTitle">الجائزة</div>
        <div class="p-desc" id="resultDesc">وصف الجائزة</div>
    </div>

    <!-- =========================================================
         لوحة الإدارة الكاملة
         ========================================================= -->
    <div class="admin-panel" id="adminPanel">
        <h3>⚙️ لوحة التحكم المتقدمة</h3>

        <div class="ap-section-title">الجوائز الحالية</div>
        <div id="adminPrizesList"></div>

        <div class="ap-section-title">إضافة جائزة جديدة</div>
        <div class="ap-add-form">
            <input type="text" id="newName" placeholder="الاسم">
            <input type="text" id="newIcon" placeholder="أيقونة" style="max-width:50px;">
            <input type="number" id="newProb" placeholder="نسبة %" style="max-width:60px;">
            <input type="color" id="newColor" value="#1f2b4a">
            <input type="color" id="newColor2" value="#0f142b">
            <button id="addPrizeBtn">➕ إضافة</button>
        </div>

        <div class="ap-section-title" style="margin-top:20px;">الإعدادات العامة</div>
        <div class="ap-settings-grid">
            <div class="ap-setting-item">
                <label>رابط صورة الخلفية</label>
                <input type="text" id="s_bg" placeholder="https://...">
                <button onclick="saveSetting('bg_image_url', 's_bg')">حفظ الخلفية</button>
            </div>
            <div class="ap-setting-item">
                <label>صورة اللودينغ</label>
                <input type="text" id="s_load" placeholder="https://...">
                <button onclick="saveSetting('loading_image_url', 's_load')">حفظ الصورة</button>
            </div>
            <div class="ap-setting-item">
                <label>أيقونة مركز العجلة</label>
                <input type="text" id="s_center" placeholder="🎯" style="max-width:80px;">
                <button onclick="saveSetting('center_icon', 's_center')">حفظ الأيقونة</button>
            </div>
            <div class="ap-setting-item">
                <label>مدة التدوير (مللي ثانية)</label>
                <input type="number" id="s_dur" placeholder="4500" style="max-width:100px;">
                <button onclick="saveSetting('spin_duration', 's_dur')">حفظ المدة</button>
            </div>
            <div class="ap-setting-item">
                <label>فترة التبريد (ساعة)</label>
                <input type="number" id="s_int" placeholder="24" style="max-width:100px;">
                <button onclick="saveSetting('spin_interval_hours', 's_int')">حفظ التبريد</button>
            </div>
            <div class="ap-setting-item" style="justify-content:center;">
                <div class="ap-checkbox">
                    <input type="checkbox" id="s_active"> تفعيل العجلة
                    <button onclick="saveSetting('is_active', 's_active', true)" style="margin:0; padding:2px 10px; background:#ffd700; color:#000;">حفظ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ================================================================
        // 1. الإعدادات الثابتة
        // ================================================================
        const CONFIG = {
            API: 'https://joj-d0kl.onrender.com',
            ADMIN_ID: 7011476249,
            SPIN_TIME: 4500
        };

        let AppState = {
            userId: null,
            prizes: [],
            rotation: 0,
            isSpinning: false,
            canSpin: false,
            settings: {}
        };

        // ================================================================
        // 2. نظام الاتصال المتقدم
        // ================================================================
        const APIManager = {
            async call(endpoint, options = {}) {
                let attempts = 0;
                while (attempts < 3) {
                    try {
                        const controller = new AbortController();
                        const timeout = setTimeout(() => controller.abort(), 15000);

                        const res = await fetch(`${CONFIG.API}${endpoint}`, {
                            ...options,
                            headers: { 'Content-Type': 'application/json', ...options.headers },
                            signal: controller.signal
                        });
                        clearTimeout(timeout);

                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        return await res.json();

                    } catch (e) {
                        attempts++;
                        if (attempts >= 3) {
                            throw new Error("تعذر الاتصال بالخادم، تحقق من الإنترنت.");
                        }
                        await new Promise(r => setTimeout(r, 1500 * attempts));
                    }
                }
            }
        };

        // ================================================================
        // 3. المحرك البصري
        // ================================================================
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        let neonOffset = 0;
        let animFrame = null;

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            const size = Math.min(rect.width, rect.height) * (window.devicePixelRatio || 1);
            canvas.width = size || 600;
            canvas.height = size || 600;
            canvas.style.width = '100%';
            canvas.style.height = '100%';
        }

        function renderWheel(highlightIdx = -1, forcedRot = null) {
            const w = canvas.width, h = canvas.height;
            const cx = w/2, cy = h/2;
            const r = Math.min(w, h)/2 - 20;
            const total = AppState.prizes.length;
            if (total === 0) return;

            const step = (2 * Math.PI) / total;
            const rot = forcedRot !== null ? forcedRot : AppState.rotation;
            ctx.clearRect(0, 0, w, h);

            AppState.prizes.forEach((p, i) => {
                const start = i * step + rot - Math.PI/2;
                const end = start + step;
                const hl = (i === highlightIdx);

                ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, start, end); ctx.closePath();
                
                const c1 = hl ? '#fdc830' : (p.color || (i % 2 === 0 ? '#1f2b4a' : '#f0e6c8'));
                const c2 = hl ? '#f37335' : (p.color2 || (i % 2 === 0 ? '#0f142b' : '#cabb9b'));
                
                const grad = ctx.createRadialGradient(cx - r*0.2, cy - r*0.2, 0, cx, cy, r);
                grad.addColorStop(0, c1); grad.addColorStop(1, c2);
                ctx.fillStyle = grad; ctx.fill();
                
                ctx.strokeStyle = hl ? '#ffffff' : 'rgba(255,215,0,0.3)';
                ctx.lineWidth = hl ? 3 : 1.5; ctx.stroke();

                const mid = start + step/2;
                const tx = cx + Math.cos(mid) * (r * 0.6);
                const ty = cy + Math.sin(mid) * (r * 0.6);
                ctx.save(); ctx.translate(tx, ty); ctx.rotate(mid + (mid > Math.PI/2 ? Math.PI : 0));
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 8;
                
                ctx.fillStyle = (i % 2 === 0 || hl) ? '#fff' : '#000';
                ctx.font = `bold 22px sans-serif`;
                ctx.fillText(p.icon || '🎁', 0, -12);
                ctx.font = `bold 13px sans-serif`;
                let name = p.name || '';
                ctx.fillText(name.length > 7 ? name.slice(0,7)+'..' : name, 0, 18);
                ctx.restore();
            });

            // 2. إطار العجلة
            ctx.beginPath(); ctx.arc(cx, cy, r + 5, 0, 2*Math.PI);
            ctx.strokeStyle = '#111'; ctx.lineWidth = 12; ctx.stroke();
            ctx.beginPath(); ctx.arc(cx, cy, r + 11, 0, 2*Math.PI);
            ctx.strokeStyle = '#332b1a'; ctx.lineWidth = 6; ctx.stroke();

            // 3. أضواء النيون المتدفقة
            const ledCount = 24;
            const ledRadius = r + 8;
            for (let i = 0; i < ledCount; i++) {
                const angle = (i / ledCount) * 2 * Math.PI - Math.PI/2;
                const lx = cx + Math.cos(angle) * ledRadius;
                const ly = cy + Math.sin(angle) * ledRadius;
                
                let dist = (i - Math.floor(neonOffset) % ledCount + ledCount) % ledCount;
                let intensity = 0;
                
                if (dist < 6) intensity = 1 - (dist / 6);
                
                ctx.beginPath(); ctx.arc(lx, ly, intensity > 0.8 ? 8 : 5, 0, 2*Math.PI);
                if (intensity > 0) {
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 40 * intensity;
                    ctx.fillStyle = `rgba(255, 240, 180, ${intensity})`;
                } else {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#2b2419';
                }
                ctx.fill();
            }

            neonOffset = (neonOffset + 0.4) % ledCount;

            // 4. المركز
            const cR = r * 0.18;
            const cGrad = ctx.createRadialGradient(cx-4, cy-6, 0, cx, cy, cR);
            cGrad.addColorStop(0, '#fff5d1'); cGrad.addColorStop(0.6, '#d4af37'); cGrad.addColorStop(1, '#8a6914');
            ctx.shadowBlur = 0;
            ctx.beginPath(); ctx.arc(cx, cy, cR, 0, 2*Math.PI);
            ctx.fillStyle = cGrad; ctx.fill();
            ctx.fillStyle = '#111'; ctx.font = 'bold 26px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(AppState.settings.center_icon || '🎯', cx+1, cy+2);
        }

        function startLoop() {
            if (animFrame) cancelAnimationFrame(animFrame);
            function loop() {
                if (AppState.prizes.length > 0 && !AppState.isSpinning) {
                    renderWheel(-1, AppState.rotation);
                }
                animFrame = requestAnimationFrame(loop);
            }
            loop();
        }

        // ================================================================
        // 4. نظام التدوير
        // ================================================================
        async function spinAction() {
            if (AppState.isSpinning || !AppState.canSpin) return;

            AppState.isSpinning = true;
            const btn = document.getElementById('spinBtn');
            btn.disabled = true; btn.classList.add('loading');
            document.getElementById('resultPanel').classList.remove('show');

            if (animFrame) cancelAnimationFrame(animFrame);

            try {
                const data = await APIManager.call('/api/wheel/spin', {
                    method: 'POST',
                    body: JSON.stringify({ user_id: AppState.userId })
                });

                if (data.success) {
                    const prize = data.spin.prize;
                    const idx = AppState.prizes.findIndex(p => p.id === prize.id);
                    const targetIdx = idx > -1 ? idx : Math.floor(Math.random() * AppState.prizes.length);
                    
                    const targetAngle = (targetIdx / AppState.prizes.length) * 2 * Math.PI;
                    const totalRot = AppState.rotation + (7 * 2 * Math.PI) + (2 * Math.PI - targetAngle - ((2*Math.PI)/AppState.prizes.length/2));

                    const duration = CONFIG.SPIN_TIME;
                    const startRot = AppState.rotation;
                    const startTime = performance.now();

                    function doSpin(now) {
                        const elapsed = now - startTime;
                        const p = Math.min(elapsed / duration, 1);
                        const eased = 1 - Math.pow(1 - p, 4);
                        AppState.rotation = startRot + (totalRot - startRot) * eased;
                        renderWheel(-1, AppState.rotation);

                        if (p < 1) requestAnimationFrame(doSpin);
                        else {
                            AppState.rotation = totalRot;
                            AppState.isSpinning = false;
                            btn.classList.remove('loading');
                            
                            renderWheel(targetIdx, totalRot);
                            const isWin = !prize.name.includes('حظ');
                            const panel = document.getElementById('resultPanel');
                            document.getElementById('resultTitle').textContent = prize.name || 'جائزة!';
                            document.getElementById('resultDesc').textContent = prize.description || '';
                            panel.classList.add('show');
                            if (isWin) panel.classList.add('winner'); else panel.classList.remove('winner');
                            
                            startLoop();
                            loadUserStatus();
                        }
                    }
                    requestAnimationFrame(doSpin);
                } else {
                    AppState.isSpinning = false;
                    btn.classList.remove('loading');
                    showMsg(data.error || "حدث خطأ", 'error');
                    startLoop();
                }
            } catch (e) {
                AppState.isSpinning = false;
                btn.classList.remove('loading');
                showMsg(e.message, 'error');
                startLoop();
            }
        }

        // ================================================================
        // 5. نظام تحميل البيانات
        // ================================================================
        async function loadPrizes() {
            try {
                const data = await APIManager.call('/api/prizes');
                if (data.success) {
                    AppState.prizes = data.prizes || [];
                    document.getElementById('wheelWrapper').classList.add('visible');
                    resizeCanvas();
                    renderWheel();
                    startLoop();
                }
            } catch (e) { showMsg("فشل تحميل الجوائز", 'error'); }
        }

        async function loadSettings() {
            try {
                const data = await APIManager.call(`/api/admin/settings?admin_id=${CONFIG.ADMIN_ID}`);
                if (data.success) {
                    AppState.settings = data.settings || {};
                    // تحديث قيم الإعدادات في لوحة التحكم
                    document.getElementById('s_bg').value = AppState.settings.bg_image_url || '';
                    document.getElementById('s_load').value = AppState.settings.loading_image_url || '';
                    document.getElementById('s_center').value = AppState.settings.center_icon || '🎯';
                    document.getElementById('s_dur').value = AppState.settings.spin_duration || 4500;
                    document.getElementById('s_int').value = AppState.settings.spin_interval_hours || 24;
                    document.getElementById('s_active').checked = AppState.settings.is_active === 'true';
                    
                    // تحديث الخلفية
                    if (AppState.settings.bg_image_url) {
                        document.getElementById('bgImage').src = AppState.settings.bg_image_url;
                    }
                }
            } catch (e) {}
        }

        async function loadUserStatus() {
            try {
                const data = await APIManager.call(`/api/wheel/history/${AppState.userId}`);
                if (data.success) {
                    AppState.canSpin = data.spin_status?.can_spin || false;
                    const btn = document.getElementById('spinBtn');
                    if (AppState.canSpin && AppState.prizes.length > 0) {
                        btn.disabled = false; btn.innerHTML = `<span class="icon">🎯</span><span class="btn-text">دَوِّر العجلة!</span>`;
                    } else if (!AppState.canSpin) {
                        btn.disabled = true;
                        const h = data.spin_status?.remaining_hours || 0;
                        const m = data.spin_status?.remaining_minutes || 0;
                        btn.innerHTML = `<span class="icon">⏳</span><span class="btn-text timer-text">${h}h ${m}m</span>`;
                    }
                }
            } catch (e) {}
        }

        // ================================================================
        // 6. الأدوات المساعدة
        // ================================================================
        function showMsg(msg, type = 'info') {
            const el = document.getElementById('globalMsg');
            el.textContent = msg; el.className = `status-msg active ${type}`;
            clearTimeout(el._timeout);
            el._timeout = setTimeout(() => el.classList.remove('active'), 4000);
        }

        function getUserId() {
            const params = new URLSearchParams(window.location.search);
            let id = params.get('user_id') || params.get('userId');
            if (id && !isNaN(id)) return parseInt(id);
            try {
                if (window.Telegram?.WebApp?.initDataUnsafe?.user?.id) {
                    return window.Telegram.WebApp.initDataUnsafe.user.id;
                }
            } catch (e) {}
            return parseInt(localStorage.getItem('wheel_user_id'));
        }

        // ================================================================
        // 7. نظام الإدارة الكامل
        // ================================================================
        window.saveSetting = async (key, inputId, isCheckbox = false) => {
            let value = document.getElementById(inputId).value;
            if (isCheckbox) value = document.getElementById(inputId).checked;
            
            await APIManager.call('/api/admin/setting', {
                method: 'PUT',
                body: JSON.stringify({ admin_id: CONFIG.ADMIN_ID, key: key, value: String(value) })
            });
            showMsg('تم حفظ الإعداد بنجاح!', 'success');
            loadSettings();
        };

        // دالة تحديث الجائزة
        window.updatePrize = async (id) => {
            const item = document.getElementById(`ap_${id}`);
            const name = item.querySelector('.ap-name').value;
            const prob = parseFloat(item.querySelector('.ap-prob').value);
            const c1 = item.querySelector('.ap-c1').value;
            const c2 = item.querySelector('.ap-c2').value;
            
            await APIManager.call(`/api/admin/prizes/${id}`, {
                method: 'PUT',
                body: JSON.stringify({ admin_id: CONFIG.ADMIN_ID, name, probability: prob, color: c1, color2: c2 })
            });
            showMsg('تم تحديث الجائزة', 'success');
            loadPrizes();
        };

        // دالة حذف الجائزة
        window.deletePrize = async (id) => {
            if(!confirm("هل أنت متأكد من حذف هذه الجائزة؟")) return;
            await APIManager.call(`/api/admin/prizes/${id}`, {
                method: 'DELETE',
                body: JSON.stringify({ admin_id: CONFIG.ADMIN_ID })
            });
            loadPrizes();
            renderAdmin();
        };

        // دالة إضافة الجائزة
        document.getElementById('addPrizeBtn').onclick = async () => {
            const n = document.getElementById('newName').value; 
            const i = document.getElementById('newIcon').value || '🎁'; 
            const p = document.getElementById('newProb').value || 10;
            const c1 = document.getElementById('newColor').value;
            const c2 = document.getElementById('newColor2').value;
            
            if(!n) return showMsg('اكتب اسماً للجائزة', 'error');
            await APIManager.call('/api/admin/prizes', {
                method: 'POST',
                body: JSON.stringify({ admin_id: CONFIG.ADMIN_ID, name:n, icon:i, probability:parseFloat(p), color: c1, color2: c2 })
            });
            showMsg('تمت إضافة الجائزة', 'success');
            document.getElementById('newName').value = '';
            loadPrizes();
            renderAdmin();
        };

        // دالة رسم لوحة الإدارة
        async function renderAdmin() {
            if (AppState.userId !== CONFIG.ADMIN_ID) return;
            document.getElementById('adminPanel').classList.add('visible');
            try {
                const data = await APIManager.call(`/api/admin/prizes?admin_id=${CONFIG.ADMIN_ID}`);
                const list = document.getElementById('adminPrizesList');
                
                if (!data.prizes || data.prizes.length === 0) {
                    list.innerHTML = `<div style="color:#666; text-align:center; padding:10px;">لا توجد جوائز مضافة بعد.</div>`;
                } else {
                    list.innerHTML = data.prizes.map(p => `
                        <div class="ap-item" id="ap_${p.id}">
                            <span style="font-size:18px;">${p.icon || '🎁'}</span>
                            <input type="text" class="ap-name" value="${p.name}" placeholder="الاسم">
                            <input type="number" class="ap-prob" value="${p.probability}" style="max-width:50px;" placeholder="%">
                            <input type="color" class="ap-c1" value="${p.color || '#1f2b4a'}">
                            <input type="color" class="ap-c2" value="${p.color2 || '#0f142b'}">
                            <div style="display:flex; gap:4px; grid-column: span 2;">
                                <button class="ap-save" onclick="updatePrize('${p.id}')">💾</button>
                                <button class="ap-del" onclick="deletePrize('${p.id}')">✕</button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                document.getElementById('adminPrizesList').innerHTML = `<div style="color:#f55; text-align:center; padding:10px;">خطأ في تحميل الجوائز</div>`;
            }
        }

        // ================================================================
        // 8. التهيئة النهائية
        // ================================================================
        async function init() {
            AppState.userId = getUserId();
            if (!AppState.userId) { document.getElementById('loadingScreen').classList.remove('active'); return; }
            localStorage.setItem('wheel_user_id', AppState.userId);

            document.getElementById('loadingScreen').classList.add('active');
            
            try {
                await loadSettings();
                await loadPrizes();
                await loadUserStatus();
                await renderAdmin();
            } catch (e) {
                showMsg("خطأ في التحميل الأولي", 'error');
            }
            
            document.getElementById('loadingScreen').classList.remove('active');
            document.getElementById('spinBtn').onclick = spinAction;
            window.addEventListener('resize', () => { resizeCanvas(); if(!AppState.isSpinning) renderWheel(); });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
